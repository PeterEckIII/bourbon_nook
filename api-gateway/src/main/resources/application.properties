server.port=8082
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8010/eureka

spring.cloud.gateway.server.webflux.routes[0].id=users-all
spring.cloud.gateway.server.webflux.routes[0].uri=lb://users-api
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users-api/users/all
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=GET
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.server.webflux.routes[0].filters[1]=RewritePath=/users-api/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[1].id=users-h2-console
spring.cloud.gateway.server.webflux.routes[1].uri=lb://users-api
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/users-api/h2-console/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/users-api/(?<segment>.*), /$\{segment}